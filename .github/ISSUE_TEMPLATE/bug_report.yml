name: Bug report
description: Report a reproducible problem in QueryPaw.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please remove database passwords, host names, customer data, and private screenshots before posting.
  - type: input
    id: version
    attributes:
      label: QueryPaw version
      description: Release version or commit hash.
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: input
    id: database
    attributes:
      label: Database
      description: Database type and version, if the issue is database-related.
      placeholder: PostgreSQL 16 / SQL Server 2022 / SQLite 3.x
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or SQL examples
      description: Remove sensitive information before sharing.
      render: text
